name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test Jellyfin.Plugin.Jellygram.sln -c Release
      - run: dotnet build Jellyfin.Plugin.Jellygram.sln -c Release --no-restore
