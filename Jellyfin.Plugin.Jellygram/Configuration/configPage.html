<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Jellygram</title>
</head>
<body>
<div id="JellygramConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
    <div data-role="content"><div class="content-primary">
        <h2>Jellygram</h2>
        <p>Grouped Telegram notifications when movies and TV are added to Jellyfin.</p>
        <form id="JellygramConfigForm">
            <div class="inputContainer"><label class="inputLabel" for="BotToken">Telegram bot token</label><input id="BotToken" type="password" is="emby-input" required><div class="fieldDescription">Create a bot with @BotFather.</div></div>
            <div class="inputContainer"><label class="inputLabel" for="ChatId">Chat ID</label><input id="ChatId" type="text" is="emby-input" required></div>
            <div class="inputContainer"><label class="inputLabel" for="ThreadId">Topic/thread ID (optional)</label><input id="ThreadId" type="text" is="emby-input"></div>
            <div class="inputContainer"><label class="inputLabel" for="BatchSeconds">Batch window in seconds</label><input id="BatchSeconds" type="number" min="5" max="3600" is="emby-input"><div class="fieldDescription">The window restarts whenever another item is added. Recommended: 90.</div></div>
            <label class="emby-checkbox-label"><input id="IncludeDescriptions" type="checkbox" is="emby-checkbox"><span>Include descriptions from Jellyfin metadata</span></label>
            <label class="emby-checkbox-label"><input id="IncludePosters" type="checkbox" is="emby-checkbox"><span>Include posters when Telegram's caption limit permits</span></label>
            <label class="emby-checkbox-label"><input id="Silent" type="checkbox" is="emby-checkbox"><span>Send silently</span></label>
            <button is="emby-button" type="submit" class="raised button-submit block"><span>Save</span></button>
        </form>
    </div></div>
    <script>
        (() => {
            const id = 'f68a16a5-3020-4fd3-92d4-9f06b09dfa9a';
            const page = document.querySelector('#JellygramConfigPage');
            page.addEventListener('pageshow', async () => {
                Dashboard.showLoadingMsg();
                const config = await ApiClient.getPluginConfiguration(id);
                for (const key of ['BotToken', 'ChatId', 'ThreadId', 'BatchSeconds']) document.querySelector('#' + key).value = config[key] ?? '';
                for (const key of ['IncludeDescriptions', 'IncludePosters', 'Silent']) document.querySelector('#' + key).checked = !!config[key];
                Dashboard.hideLoadingMsg();
            });
            document.querySelector('#JellygramConfigForm').addEventListener('submit', async event => {
                event.preventDefault(); Dashboard.showLoadingMsg();
                const config = await ApiClient.getPluginConfiguration(id);
                for (const key of ['BotToken', 'ChatId', 'ThreadId']) config[key] = document.querySelector('#' + key).value.trim();
                config.BatchSeconds = Number(document.querySelector('#BatchSeconds').value) || 90;
                for (const key of ['IncludeDescriptions', 'IncludePosters', 'Silent']) config[key] = document.querySelector('#' + key).checked;
                const result = await ApiClient.updatePluginConfiguration(id, config);
                Dashboard.processPluginConfigurationUpdateResult(result);
            });
        })();
    </script>
</div>
</body>
</html>
